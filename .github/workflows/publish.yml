name: Publish to PyPI

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    validate-version:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Extract tag version
              id: tag
              run: |
                  echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Extract pyproject.toml version
              id: pyproject
              run: |
                  VERSION=$(grep '^version =' pyproject.toml | head -1 | sed -E "s/version = \"([^\"]+)\"/\1/")
                  echo "PYPROJECT_VERSION=$VERSION" >> $GITHUB_OUTPUT

            - name: Compare versions
              run: |
                  if [ "${{ steps.tag.outputs.TAG_VERSION }}" != "${{ steps.pyproject.outputs.PYPROJECT_VERSION }}" ]; then
                    echo "Tag version (${{ steps.tag.outputs.TAG_VERSION }}) does not match pyproject.toml version (${{ steps.pyproject.outputs.PYPROJECT_VERSION }})"
                    exit 1
                  fi

    publish:
        needs: validate-version
        runs-on: ubuntu-latest
        environment:
            name: pypi
            url: https://pypi.org/p/slurming
        permissions:
            id-token: write  # 必须，用于 Trusted Publishing
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'


            - name: Install Poetry
              run: |
                  python -m pip install --upgrade pip
                  pip install poetry

            - name: Build package
              run: |
                  poetry build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
